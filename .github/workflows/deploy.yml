# =============================================================================
# Taniti Island — CI/CD Pipeline
#
# Runs on every push to main and every pull request.
# Pipeline has two stages:
#   1. quality-check — validates HTML and scans for issues
#   2. deploy        — ships to Cloudflare Pages (main branch only)
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token with Pages:Edit permission
#   CLOUDFLARE_ACCOUNT_ID — Your Cloudflare account ID
# =============================================================================

name: CI/CD — Build, Check & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Use Node 24 to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1: Quality Checks
  # ---------------------------------------------------------------------------
  quality-check:
    name: 🔍 Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate HTML files
        run: |
          echo "Installing HTML validator..."
          npm install -g html-validate
          echo "Validating HTML files..."
          html-validate \
            index.html \
            about.html \
            explore.html \
            plan.html \
            faq.html \
            coming-soon.html \
            --formatter codeframe \
            || echo "⚠️  HTML validation warnings found — review above"

      - name: Check internal links
        run: |
          echo "Checking internal links..."
          broken=0
          for file in *.html; do
            links=$(grep -oP 'href="\K[^"]+(?=")' "$file" \
              | grep -v '^http' \
              | grep -v '^#' \
              | grep -v '^mailto' \
              | grep -v '^tel' \
              | grep '\.html' \
              | sed 's/?.*$//' \
              | sed 's/#.*$//' \
              | grep -v '^$' \
              | sort -u)
            while IFS= read -r link; do
              if [ -n "$link" ] && [ ! -f "$link" ]; then
                echo "❌ Broken link in $file: $link"
                broken=1
              fi
            done <<< "$links"
          done
          if [ $broken -eq 0 ]; then
            echo "✅ All internal links are valid"
          else
            exit 1
          fi

      - name: Check asset references
        run: |
          echo "Checking asset file references..."
          missing=0
          for file in *.html scripts.js; do
            [ -f "$file" ] || continue
            assets=$(grep -oP 'Assets/\K[^"'\'')\s]+' "$file" || true)
            while IFS= read -r asset; do
              if [ -n "$asset" ] && [ ! -f "Assets/$asset" ]; then
                echo "❌ Missing asset in $file: Assets/$asset"
                missing=1
              fi
            done <<< "$assets"
          done
          if [ $missing -eq 0 ]; then
            echo "✅ All asset references are valid"
          else
            exit 1
          fi

      - name: Audit asset file sizes
        run: |
          echo "Auditing asset file sizes..."
          find Assets/ -type f \( -name "*.jpg" -o -name "*.png" -o -name "*.webp" \) | while read img; do
            size=$(stat -c%s "$img")
            size_kb=$((size / 1024))
            if [ $size -gt 1048576 ]; then
              echo "⚠️  Large asset (${size_kb}KB): $img — consider compressing"
            fi
          done
          echo "✅ Asset size audit complete"
          exit 0

  # ---------------------------------------------------------------------------
  # JOB 2: Deploy to Cloudflare Pages
  # Only runs on pushes to main, only if quality checks pass
  # ---------------------------------------------------------------------------
  deploy:
    name: 🚀 Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy . \
            --project-name=taniti-island \
            --commit-dirty=true

      - name: Deployment complete
        run: |
          echo "✅ Deployed successfully!"
          echo "🌐 Live: https://taniti-island.mrabrahammacias.workers.dev"
